version: "3.3"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # Pueder leer de fichero .env
    env_file:
      - ./backend/.env
    # Si no tienes un fichero .env puedes descomentar las siguientes lineas y cambiar los valores por los que necesites
    # environment:
    #   - DB_USER=postgres
    #   - DB_PASSWORD=password
    #   - DB_HOST=db
    #   - DB_PORT=5432
    #   - DB_NAME=app_db
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # IMPORTANTE: Para que esto funcione, en ./frontend/.env 
        # debe existir VITE_API_URL
        - VITE_API_URL=${VITE_API_URL}

        # Aunque React no lo use en ejecución, esto ayuda a Compose
        # a encontrar la variable para el 'args' de arriba
    env_file:
      - ./frontend/.env
    ports:
      - "3000:80" # redirección del puerto de Nginx

  db:
    image: postgres:15
    container_name: postgres_db
    env_file:
      - .env
    # environment:
    #   POSTGRES_USER: postgres
    #   POSTGRES_PASSWORD: password
    #   POSTGRES_DB: app_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
